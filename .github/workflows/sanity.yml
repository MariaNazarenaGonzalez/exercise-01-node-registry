name: Sanity Check

on:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest requests
      - run: pytest tests/ -v --tb=short
